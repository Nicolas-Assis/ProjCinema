<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes - CineControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-film"></i> CineControl</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro-filmes.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessoes</a></li>
                    <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
                    <li class="nav-item"><a class="nav-link" href="sessoes.html">Programacao</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-5 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-film"></i> Cadastro de Filmes</h5>
                    </div>
                    <div class="card-body">
                        <form id="formFilme">
                            <div class="mb-3">
                                <label for="titulo" class="form-label">Titulo *</label>
                                <input type="text" class="form-control" id="titulo" required>
                            </div>
                            <div class="mb-3">
                                <label for="genero" class="form-label">Genero *</label>
                                <input type="text" class="form-control" id="genero" required>
                            </div>
                            <div class="mb-3">
                                <label for="descricao" class="form-label">Descricao</label>
                                <textarea class="form-control" id="descricao" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="classificacao" class="form-label">Classificacao *</label>
                                <select class="form-select" id="classificacao" required>
                                    <option value="">Selecione...</option>
                                    <option value="Livre">Livre</option>
                                    <option value="10 anos">10 anos</option>
                                    <option value="12 anos">12 anos</option>
                                    <option value="14 anos">14 anos</option>
                                    <option value="16 anos">16 anos</option>
                                    <option value="18 anos">18 anos</option>
                                </select>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label for="duracao" class="form-label">Duracao (min) *</label>
                                    <input type="number" class="form-control" id="duracao" required min="1">
                                </div>
                                <div class="col-6 mb-3">
                                    <label for="dataEstreia" class="form-label">Estreia *</label>
                                    <input type="date" class="form-control" id="dataEstreia" required>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Salvar</button>
                                <button type="reset" class="btn btn-outline-secondary"><i class="bi bi-x-circle"></i> Limpar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-list-ul"></i> Filmes Cadastrados</h5>
                        <span class="badge bg-primary" id="contadorFilmes">0</span>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr><th>Titulo</th><th>Genero</th><th>Classificacao</th><th>Duracao</th><th>Acoes</th></tr>
                                </thead>
                                <tbody id="listaFilmes"></tbody>
                            </table>
                        </div>
                        <div id="mensagemVazia" class="text-center text-muted py-4 hidden">
                            <i class="bi bi-inbox display-4"></i>
                            <p>Nenhum filme cadastrado.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAlerta" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Sucesso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body" id="modalMensagem"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">2026 CineControl</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/filmes.js"></script>
</body>
</html>
