<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programacao - CineControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-film"></i> CineControl</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessoes</a></li>
                    <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sessoes.html">Programacao</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-programacao text-white text-center">
        <div class="container">
            <h1 class="display-5 fw-bold"><i class="bi bi-calendar-week"></i> Programacao</h1>
            <p class="lead mb-0">Confira todas as sessoes disponiveis</p>
        </div>
    </section>

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-4 mb-2 mb-md-0">
                        <label for="filtroFilme" class="form-label fw-bold">Filme:</label>
                        <select class="form-select" id="filtroFilme">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-2 mb-md-0">
                        <label for="filtroData" class="form-label fw-bold">Data:</label>
                        <input type="date" class="form-control" id="filtroData">
                    </div>
                    <div class="col-md-3 mb-2 mb-md-0">
                        <label for="filtroIdioma" class="form-label fw-bold">Idioma:</label>
                        <select class="form-select" id="filtroIdioma">
                            <option value="">Todos</option>
                            <option value="Dublado">Dublado</option>
                            <option value="Legendado">Legendado</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-outline-secondary w-100" onclick="limparFiltros()">
                            <i class="bi bi-x-circle"></i> Limpar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="bi bi-list-ul"></i> Sessoes Disponiveis</h4>
            <span class="badge bg-primary fs-6" id="contadorSessoes">0 sessoes</span>
        </div>
        <div class="row" id="listaSessoes"></div>
        <div id="mensagemVazia" class="text-center text-muted py-5 hidden">
            <i class="bi bi-calendar-x display-1"></i>
            <h4 class="mt-3">Nenhuma sessao encontrada</h4>
            <a href="cadastro-sessoes.html" class="btn btn-primary mt-2">
                <i class="bi bi-plus-circle"></i> Cadastrar Sessao
            </a>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">2026 CineControl</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/programacao.js"></script>
</body>
</html>
